name: Relatório Diário Cripto

on:
  schedule:
    # Roda toda hora UTC. O script só envia email se for o horário de pico configurado.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Forçar envio mesmo fora do horário de pico"
        required: false
        default: "false"

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar relatório
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RUN_MODE: ${{ github.event.inputs.force == 'true' && 'force' || 'check' }}
        run: python crypto_daily_report.py
