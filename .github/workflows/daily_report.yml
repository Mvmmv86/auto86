name: Relatório Diário Cripto

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Forçar envio mesmo fora do horário de pico"
        required: false
        default: "false"

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar relatório
        id: run
        continue-on-error: true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RUN_MODE: ${{ github.event.inputs.force == 'true' && 'force' || 'check' }}
        run: |
          mkdir -p logs
          {
            echo "=== AMBIENTE ==="
            echo "Data UTC: $(date -u)"
            echo "RUN_MODE: ${RUN_MODE}"
            echo "Event:    ${{ github.event_name }}"
            echo "Force in: ${{ github.event.inputs.force }}"
            echo "SHA:      ${{ github.sha }}"
            echo "=== EXECUÇÃO ==="
            python crypto_daily_report.py 2>&1
            echo "=== EXIT_CODE=$? ==="
          } | tee logs/last_run.log
          # Captura exit code real do python (PIPESTATUS[0] = primeiro comando do pipe)
          exit ${PIPESTATUS[0]}

      - name: Commitar log + estado
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add logs/ last_sent.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "log: relatório diário [skip ci]"
          git push || true

      - name: Falhar se script falhou
        if: steps.run.outcome == 'failure'
        run: exit 1
